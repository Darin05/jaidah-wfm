<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Jaidah - My Schedule</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f3f4f6;color:#111827;font-size:13px}
.header{background:#111827;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:15px;font-weight:700;margin:0}
.header .sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.agbadge{font-size:13px;color:#93c5fd;font-weight:700}
.chgbtn{font-size:11px;color:#fff;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:Arial,sans-serif}
.chgbtn:hover{background:rgba(255,255,255,.25)}
.picker{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f3f4f6}
.pbox{background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:32px 28px;width:360px;max-width:94vw;text-align:center}
.pbox h2{font-size:18px;font-weight:700;margin-bottom:6px}
.pbox p{font-size:12px;color:#6b7280;margin-bottom:18px;line-height:1.5}
.pbox select{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;font-family:Arial,sans-serif;margin-bottom:14px;background:#fff}
.pbox button{width:100%;padding:11px;background:#111827;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif}
.pbox button:hover{background:#1f2937}
.phint{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:8px 12px;font-size:11px;color:#1e3a8a;margin-top:12px;text-align:left;line-height:1.5}
.app{display:none}
.pg{padding:16px 18px;max-width:960px;margin:0 auto}
.wnav{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.wnav button{padding:6px 14px;border:1px solid #d1d5db;background:#fff;border-radius:8px;cursor:pointer;font-size:12px;font-family:Arial,sans-serif}
.wnav button:hover{background:#f9fafb}
.wnav span{font-size:13px;font-weight:700;min-width:190px;text-align:center}
.wnav select{padding:6px 10px;border:1px solid #d1d5db;border-radius:8px;background:#fff;font-size:12px;font-family:Arial,sans-serif}
.mets{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
.met{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:11px 13px}
.met .l{font-size:10px;color:#6b7280;margin-bottom:2px}
.met .v{font-size:21px;font-weight:700}
.met .s{font-size:10px;color:#6b7280}
.days{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px;margin-bottom:14px}
.dc{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px;position:relative}
.dc.today{border:2px solid #1d4ed8}
.dc.offday{background:#f9fafb}
.dc.leaveday{background:#fff7ed;border-color:#fed7aa}
.dchdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.dow{font-size:11px;font-weight:700}
.ddate{font-size:10px;color:#6b7280;margin-top:1px}
.tbadge{position:absolute;top:8px;right:8px;background:#1d4ed8;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:999px}
.shtime{font-size:12px;font-weight:700;color:#1d4ed8;margin-bottom:5px}
.pill{display:inline-block;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:700;border:1px solid}
.p-work{background:#ecfeff;color:#155e75;border-color:#a5f3fc}
.p-off{background:#f3f4f6;color:#4b5563;border-color:#d1d5db}
.p-leave{background:#fff7ed;color:#9a3412;border-color:#fed7aa}
.p-fri{background:#eff6ff;color:#1e40af;border-color:#bfdbfe}
.brkblock{margin-top:8px;padding-top:8px;border-top:1px solid #f3f4f6}
.brklbl{font-size:9px;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.brkrow{font-size:11px;color:#374151;line-height:1.7}
.offrsn{font-size:11px;color:#6b7280;margin-top:5px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px;margin-bottom:12px}
.ch{font-size:13px;font-weight:700;margin-bottom:10px}
@media(max-width:600px){.mets{grid-template-columns:repeat(2,1fr)}.days{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="picker" id="pickerDiv">
  <div class="pbox">
    <h2>Jaidah Automotive</h2>
    <p>Customer Experience Team<br>Select your name to view your schedule</p>
    <select id="agSel">
      <option value="">-- Select your name --</option>
    </select>
    <button onclick="goAgent()">View my schedule</button>
    <div class="phint">You will see your shift times, days off, breaks and lunch for any week.</div>
  </div>
</div>

<div class="app" id="appDiv">
  <div class="header">
    <div>
      <h1>Jaidah Automotive &mdash; My Schedule</h1>
      <div class="sub">Customer Experience &bull; Sat-Thu 8am-7pm &bull; Friday always off</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="agbadge" id="agBadge"></span>
      <button class="chgbtn" onclick="goBack()">Change</button>
    </div>
  </div>
  <div class="pg">
    <div class="wnav">
      <button onclick="prevW()">&larr; Prev</button>
      <span id="wkLbl">Loading...</span>
      <button onclick="nextW()">Next &rarr;</button>
      <select id="monSel" onchange="onMon(this.value)"></select>
      <select id="wkSel" onchange="onWk(Number(this.value))"></select>
    </div>
    <div class="mets" id="metsDiv"></div>
    <div class="days" id="daysDiv"></div>
    <div id="leaveDiv"></div>
  </div>
</div>

<script>
const defaultAgents=[
{id:1,name:'Jofferson Nucup',lang:'English',shift:1,active:true,preferredOff:2},
{id:2,name:'Ghizlen',lang:'English/Arabic',shift:1,active:true,preferredOff:0},
{id:3,name:'Karen Roco',lang:'English',shift:1,active:true,preferredOff:0},
{id:4,name:'Mohamed Amine',lang:'English/Arabic',shift:1,active:true,preferredOff:3},
{id:5,name:'Souhire',lang:'English/Arabic',shift:1,active:true,preferredOff:4},
{id:6,name:'Abbey Rose',lang:'English',shift:1,active:true,preferredOff:6},
{id:7,name:'Habiba Selimi',lang:'English/Arabic',shift:1,active:true,preferredOff:3},
{id:8,name:'Mohamed Khadraoui',lang:'English/Arabic',shift:1,active:true,preferredOff:2},
{id:9,name:'Sief Al Dine',lang:'Arabic',shift:1,active:true,preferredOff:1},
{id:10,name:'Hssan Boussetta',lang:'English/Arabic',shift:2,active:true,preferredOff:4},
{id:11,name:'Lee Jerick',lang:'English/Arabic',shift:2,active:true,preferredOff:0},
{id:12,name:'Abderahman',lang:'English/Arabic',shift:2,active:true,preferredOff:2},
{id:13,name:'Ghada',lang:'English/Arabic',shift:2,active:true,preferredOff:3},
{id:14,name:'Chrstine',lang:'English/Arabic',shift:2,active:true,preferredOff:2},
{id:15,name:'Ma Cristina Beltran',lang:'English/Arabic',shift:2,active:true,preferredOff:1}
];
const STORAGE_KEY='jaidah_roster_v18';

// ── Cloud sync: read from JSONBin ──
function getBinId(){
  var p=new URLSearchParams(window.location.search);
  var b=p.get('bin');
  if(b){ localStorage.setItem('jaidah_bin_id',b); return b; }
  return localStorage.getItem('jaidah_bin_id')||'';
}

function pullFromCloud(cb){
  var binId=getBinId();
  if(!binId){ cb(null); return; }
  // Public bin - no API key needed for reading
  fetch('https://api.jsonbin.io/v3/b/'+binId+'/latest')
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data && data.record){
        cb(data.record);
      } else {
        cb(null);
      }
    })
    .catch(function(){ cb(null); });
}

function applyCloudState(cloudState){
  if(!cloudState) return false;
  if(!cloudState.agents) cloudState.agents=JSON.parse(JSON.stringify(defaultAgents));
  if(!cloudState.leaves) cloudState.leaves=[];
  if(!cloudState.weekOverrides) cloudState.weekOverrides={};
  if(!cloudState.breakOverrides) cloudState.breakOverrides={};
  if(!cloudState.month) cloudState.month=todayMonth();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cloudState));
  return true;
}

const breakTemplates={
1:[['09:45-10:00','12:00-12:30','15:00-15:15'],['10:00-10:15','12:30-13:00','15:15-15:30'],['10:15-10:30','13:00-13:30','15:30-15:45'],['10:30-10:45','13:30-14:00','15:45-16:00']],
2:[['10:15-10:30','12:30-13:00','15:30-15:45'],['10:30-10:45','13:00-13:30','15:45-16:00'],['10:45-11:00','13:30-14:00','16:00-16:15'],['11:00-11:15','14:00-14:30','16:15-16:30']]
};
function humanDate(d){return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});} 

function pad(n){return String(n).padStart(2,'0');}
function fmtDate(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function todayMonth(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function getMonthInfo(monthStr){
  const [y,m]=monthStr.split('-').map(Number); const first=new Date(y,m-1,1); const last=new Date(y,m,0); const weeks=[];
  let start=new Date(first); while(start.getDay()!==6) start.setDate(start.getDate()-1); // back to Saturday
  while(start<=last || start.getDay()!==6 || weeks.length===0){
    const s=new Date(start); const e=new Date(start); e.setDate(e.getDate()+6); weeks.push({start:s,end:e,label:`${humanDate(s)} - ${humanDate(e)}`}); start.setDate(start.getDate()+7);
    if(start>last && start.getMonth()!==first.getMonth() && start.getDay()===6) break;
  }
  return {year:y,month:m,weeks};
}
function weekKey(start){return fmtDate(start);}
function getSelectedWeek(){const info=getMonthInfo(state.month); if(state.selectedWeek>info.weeks.length-1) state.selectedWeek=info.weeks.length-1; if(state.selectedWeek<0) state.selectedWeek=0; return info.weeks[state.selectedWeek];}
function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed=JSON.parse(raw);
      parsed.agents ||= JSON.parse(JSON.stringify(defaultAgents));
      parsed.leaves ||= [];
      parsed.weekOverrides ||= {};
      parsed.month ||= todayMonth();
      parsed.selectedWeek ||= 0;
      parsed.breakOverrides ||= {};
      return parsed;
    }
  }catch(e){}
  return {agents:JSON.parse(JSON.stringify(defaultAgents)),leaves:[],weekOverrides:{},breakOverrides:{},month:todayMonth(),selectedWeek:0};
}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function getLeaveMap(){
  const map={};
  state.leaves.forEach(l=>{getLeaveDates(l.agentId,l.start,l.end).forEach(dt=>{map[`${l.agentId}|${dt}`]=l.type||'Leave';});});
  return map;
}
function getLeaveDates(agentId,start,end){
  const out=[]; let d=new Date(start); const e=new Date(end); while(d<=e){out.push(fmtDate(d)); d.setDate(d.getDate()+1);} return out;
}
function activeAgents(){return state.agents.filter(a=>a.active);}
function getAgentById(id){return state.agents.find(a=>a.id===id);}
function autoSecondOffDate(agent,week){
  if(countWeeklyLeaves(agent.id,week)>=2) return null; // leave already gives rest
  let best=null;
  for(let i=0;i<7;i++){
    const d=new Date(week.start); d.setDate(d.getDate()+i); const dow=d.getDay();
    if(dow===5) continue; // Friday fixed off handled separately
    const score=(dow===agent.preferredOff?0:2)+(dow===4?0.2:0)+(dow===6?0.5:0)+(dow===0?0.8:0)+(dow===1?1:0)+(dow===2?1.2:0)+(dow===3?1.5:0);
    if(!best || score<best.score) best={date:fmtDate(d),score};
  }
  return best?best.date:null;
}
function countWeeklyLeaves(agentId,week){
  const leaveMap=getLeaveMap(); let c=0; for(let i=0;i<7;i++){ const d=new Date(week.start); d.setDate(d.getDate()+i); if(leaveMap[`${agentId}|${fmtDate(d)}`]) c++; } return c;
}
function getWeekPlan(week){
  const leaveMap=getLeaveMap();
  const overrides=state.weekOverrides[weekKey(week.start)]||{};
  const plan={};
  activeAgents().forEach(agent=>{
    const secondOff=autoSecondOffDate(agent,week);
    for(let i=0;i<7;i++){
      const d=new Date(week.start); d.setDate(d.getDate()+i); const ds=fmtDate(d); const k=`${agent.id}|${ds}`;
      let status='WORK'; let reason='';
      if(d.getDay()===5){status='OFF'; reason='Friday fixed';}
      else if(leaveMap[k]){status='LEAVE'; reason=leaveMap[k];}
      else if(secondOff && ds===secondOff){status='OFF'; reason='Weekly off';}
      if(overrides[k]){status=overrides[k].status; reason=overrides[k].reason||'Manual edit';}
      plan[k]={status,reason};
    }
  });
  return plan;
}
function buildBreakPlanForDate(dateStr,weekPlan){
  const result={};
  const usage={};
  function canUse(range){
    for(let t=range.start;t<range.end;t+=15){ if((usage[t]||0)>=2) return false; }
    return true;
  }
  function reserve(range){
    for(let t=range.start;t<range.end;t+=15){ usage[t]=(usage[t]||0)+1; }
  }
  [1,2].forEach(shift=>{
    let idx=0;
    activeAgents().filter(agent=>agent.shift===shift).forEach(agent=>{
      const p=weekPlan[`${agent.id}|${dateStr}`];
      if(!p || p.status!=='WORK') return;
      const ov=getBreakOverride(agent.id,dateStr);
      if(ov){ result[agent.id]=ov; ov.forEach(x=>reserve(parseRangeMinutes(x))); return; }
      const templates=breakTemplates[shift]||breakTemplates[1];
      let selected=templates[idx % templates.length];
      for(let step=0; step<templates.length; step++) {
        const cand=templates[(idx+step) % templates.length];
        if(cand.every(x=>canUse(parseRangeMinutes(x)))) { selected=cand; idx=(idx+step+1); break; }
      }
      result[agent.id]=selected;
      selected.forEach(x=>reserve(parseRangeMinutes(x)));
      idx++;
    });
  });
  return result;
}
function parseRangeMinutes(r){
  const [s,e]=r.split('-');
  const [sh,sm]=s.split(':').map(Number);
  const [eh,em]=e.split(':').map(Number);
  return {start:sh*60+sm,end:eh*60+em};
}
function getBreakOverride(agentId,dateStr){ return state.breakOverrides[`${agentId}|${dateStr}`] || null; }
function overlapsWeek(l,week){return new Date(l.end)>=week.start && new Date(l.start)<=week.end;}

var st = loadState();
var state = st;
var curAgent = 0;
var curMon = todayMonth();
var curWk = 0;

function populatePicker(){
  var sel = document.getElementById('agSel');
  sel.innerHTML = '<option value="">-- Select your name --</option>';
  var agents = st.agents.filter(function(a){ return a.active; });
  agents.forEach(function(a){
    var o = document.createElement('option');
    o.value = a.id;
    o.textContent = a.name + ' (Shift ' + a.shift + ' - ' + (a.shift===1?'08:00-17:30':'09:30-19:00') + ')';
    sel.appendChild(o);
  });
}

function init(){
  pullFromCloud(function(cloudState){
    if(applyCloudState(cloudState)){
      st = loadState();
      state = st;
    }
    populatePicker();
    // Show warning if no bin configured
    if(!getBinId()){
      var hint = document.querySelector('.phint');
      if(hint) hint.innerHTML += '<br><br><strong style="color:#92400e">Not connected to cloud. Ask your manager for the correct link.</strong>';
    }
  });
}

function goAgent(){
  var id = Number(document.getElementById('agSel').value);
  if(!id){ alert('Please select your name.'); return; }
  curAgent = id;
  var a = st.agents.find(function(x){ return x.id===id; });
  document.getElementById('agBadge').textContent = a.name;
  document.getElementById('pickerDiv').style.display = 'none';
  document.getElementById('appDiv').style.display = 'block';
  curMon = todayMonth(); curWk = 0;
  buildMon(); draw();
}

function goBack(){
  document.getElementById('appDiv').style.display = 'none';
  document.getElementById('pickerDiv').style.display = 'flex';
  curAgent = 0;
}

function buildMon(){
  var sel = document.getElementById('monSel');
  sel.innerHTML = '';
  var now = new Date();
  for(var o=-1; o<=2; o++){
    var d = new Date(now.getFullYear(), now.getMonth()+o, 1);
    var v = fmtDate(d).substring(0,7);
    var l = d.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
    var opt = document.createElement('option');
    opt.value=v; opt.textContent=l;
    if(v===curMon) opt.selected=true;
    sel.appendChild(opt);
  }
  buildWk();
}

function buildWk(){
  var info = getMonthInfo(curMon);
  var sel = document.getElementById('wkSel');
  sel.innerHTML = info.weeks.map(function(w,i){
    var s = w.start.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
    var e = w.end.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
    return '<option value="'+i+'"'+(i===curWk?' selected':'')+'>Week '+(i+1)+': '+s+' - '+e+'</option>';
  }).join('');
}

function onMon(v){ curMon=v; curWk=0; buildWk(); draw(); }
function onWk(v){ curWk=v; buildWk(); draw(); }

function prevW(){
  if(curWk>0){ curWk--; buildWk(); draw(); return; }
  var d=new Date(curMon+'-01'); d.setMonth(d.getMonth()-1);
  curMon=fmtDate(d).substring(0,7);
  curWk=getMonthInfo(curMon).weeks.length-1;
  buildMon(); draw();
}
function nextW(){
  var info=getMonthInfo(curMon);
  if(curWk<info.weeks.length-1){ curWk++; buildWk(); draw(); return; }
  var d=new Date(curMon+'-01'); d.setMonth(d.getMonth()+1);
  curMon=fmtDate(d).substring(0,7); curWk=0;
  buildMon(); draw();
}

function draw(){
  st = loadState();
  state = st;
  // Always use latest localStorage (updated by cloud pull)
  var agent = st.agents.find(function(a){ return a.id===curAgent; });
  if(!agent) return;
  var info = getMonthInfo(curMon);
  if(curWk>=info.weeks.length) curWk=info.weeks.length-1;
  var week = info.weeks[curWk];
  st.month=curMon; st.selectedWeek=curWk;
  var wp = getWeekPlan(week);
  var today = fmtDate(new Date());
  var DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  document.getElementById('wkLbl').textContent=
    week.start.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+
    ' - '+week.end.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});

  var work=0,off=0,leave=0,cards=[];
  for(var i=0;i<7;i++){
    var d=new Date(week.start); d.setDate(d.getDate()+i);
    var ds=fmtDate(d); var dow=d.getDay();
    var plan=wp[agent.id+'|'+ds];
    var isT=ds===today;
    var brks=(plan&&plan.status==='WORK')?(buildBreakPlanForDate(ds,wp)[agent.id]||[]):[];
    var spill='',cls='dc',body='',shtm='';
    if(plan&&plan.status==='WORK'){
      work++;
      spill='<span class="pill p-work">Working</span>';
      if(isT) cls+=' today';
      shtm='<div class="shtime">'+(agent.shift===1?'08:00 - 17:30':'09:30 - 19:00')+'</div>';
      if(brks.length>0){
        body='<div class="brkblock"><div class="brklbl">Breaks &amp; Lunch</div>';
        brks.forEach(function(b){
          var mins=parseRangeMinutes(b).end-parseRangeMinutes(b).start;
          body+='<div class="brkrow">'+(mins>=30?'Lunch: ':'Break: ')+b+'</div>';
        });
        body+='</div>';
      }
    } else if(plan&&plan.status==='LEAVE'){
      leave++;
      spill='<span class="pill p-leave">On Leave</span>';
      cls+=' leaveday'; if(isT) cls+=' today';
      body='<div class="offrsn">'+(plan.reason||'Approved leave')+'</div>';
    } else if(plan&&plan.status==='OFF'){
      off++;
      var fri=dow===5;
      spill=fri?'<span class="pill p-fri">Friday Off</span>':'<span class="pill p-off">Day Off</span>';
      cls+=' offday'; if(isT) cls+=' today';
      body='<div class="offrsn">'+(fri?'Center closed - fixed off':'Rotation day off')+'</div>';
    }
    cards.push('<div class="'+cls+'">'+(isT?'<div class="tbadge">TODAY</div>':'')
      +'<div class="dchdr"><div><div class="dow">'+DAYS[dow]+'</div><div class="ddate">'+d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+'</div></div>'+spill+'</div>'
      +shtm+body+'</div>');
  }

  document.getElementById('metsDiv').innerHTML=
    '<div class="met"><div class="l">Working days</div><div class="v" style="color:#166534">'+work+'</div><div class="s">this week</div></div>'
    +'<div class="met"><div class="l">Days off</div><div class="v" style="color:#1d4ed8">'+off+'</div><div class="s">incl. Friday</div></div>'
    +'<div class="met"><div class="l">Leave days</div><div class="v" style="color:#9a3412">'+leave+'</div><div class="s">this week</div></div>'
    +'<div class="met"><div class="l">My shift</div><div class="v" style="font-size:14px">'+(agent.shift===1?'08:00':'09:30')+'</div><div class="s">'+(agent.shift===1?'ends 17:30':'ends 19:00')+'</div></div>';
  document.getElementById('daysDiv').innerHTML=cards.join('');

  var myL=st.leaves.filter(function(l){ return l.agentId===agent.id; });
  if(myL.length>0){
    var lhtml='<div class="card"><div class="ch">Your approved leave</div>';
    myL.forEach(function(l){
      lhtml+='<div style="display:flex;justify-content:space-between;padding:8px 12px;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;margin-bottom:6px;font-size:12px"><span>'+l.type+'</span><span>'+l.start+(l.end&&l.end!==l.start?' to '+l.end:'')+'</span></div>';
    });
    lhtml+='</div>';
    document.getElementById('leaveDiv').innerHTML=lhtml;
  } else document.getElementById('leaveDiv').innerHTML='';
}

// Auto-refresh from cloud every 30 seconds
setInterval(function(){
  pullFromCloud(function(cloudState){
    if(applyCloudState(cloudState)){
      st = loadState();
      state = st;
    }
    if(curAgent) draw();
  });
}, 30000);

init();
</script>
</body>
