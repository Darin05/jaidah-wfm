<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jaidah Automotive CX Roster Planner</title>
<style>
:root{--bg:#f3f4f6;--card:#fff;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--nav:#111827;--nav2:#1f2937;--brand:#1d4ed8;--ok:#166534;--okbg:#ecfdf5;--warn:#92400e;--warnbg:#fffbeb;--bad:#991b1b;--badbg:#fef2f2;--off:#f3f4f6;--leave:#fff7ed;--fixed:#eff6ff;--work:#ecfeff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:13px}
button,input,select{font:inherit}
.layout{display:flex;min-height:100vh}
.side{width:230px;background:var(--nav);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.brand{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand h2{font-size:16px;margin-bottom:4px}.brand p{font-size:11px;color:rgba(255,255,255,.6);line-height:1.45}
.nb{display:block;width:100%;padding:11px 16px;background:none;border:none;color:rgba(255,255,255,.7);text-align:left;cursor:pointer;font-size:12px}
.nb.on,.nb:hover{background:rgba(59,130,246,.18);color:#fff}
.foot{margin-top:auto;padding:14px 16px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.55)}
.main{flex:1;display:flex;flex-direction:column}
.top{background:#fff;border-bottom:1px solid var(--line);padding:14px 20px;display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap}
.top h1{font-size:18px;margin-bottom:4px}.sub{font-size:11px;color:var(--muted)}
.controls{display:flex;gap:10px;align-items:end;flex-wrap:wrap}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}.field input,.field select{padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;background:#fff;min-width:120px}
.pg{padding:18px 20px}
.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
.met{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}.met .l{font-size:11px;color:var(--muted);margin-bottom:4px}.met .v{font-size:24px;font-weight:700}.met .s{font-size:11px;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
.ch{font-size:14px;font-weight:700;margin-bottom:12px}
.note,.ok,.warn,.bad{padding:10px 12px;border-radius:10px;margin-bottom:12px;font-size:12px;line-height:1.45}
.note{background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a}.ok{background:var(--okbg);border:1px solid #bbf7d0;color:var(--ok)}.warn{background:var(--warnbg);border:1px solid #fde68a;color:var(--warn)}.bad{background:var(--badbg);border:1px solid #fecaca;color:var(--bad)}
.btn{padding:8px 12px;border:1px solid #d1d5db;background:#fff;border-radius:8px;cursor:pointer}.btn:hover{background:#f9fafb}.btnp{background:var(--brand);border-color:var(--brand);color:#fff}.btnp:hover{background:#1e40af}.btnr{background:#fff1f2;border-color:#fecdd3;color:#9f1239}
.tbl{width:100%;border-collapse:collapse}.tbl th{font-size:11px;color:var(--muted);text-align:left;padding:8px;border-bottom:1px solid var(--line);font-weight:600}.tbl td{padding:8px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.pill{display:inline-block;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:700;border:1px solid}.p-work{background:#ecfeff;color:#155e75;border-color:#a5f3fc}.p-fixed{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}.p-off{background:#f3f4f6;color:#4b5563;border-color:#d1d5db}.p-leave{background:#fff7ed;color:#9a3412;border-color:#fed7aa}.p-sh1{background:#eff6ff;color:#1e40af;border-color:#bfdbfe}.p-sh2{background:#f5f3ff;color:#6d28d9;border-color:#ddd6fe}
.weekgrid{display:grid;grid-template-columns:220px repeat(7,minmax(120px,1fr));gap:6px;align-items:stretch}
.wh,.wc{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px}.wh{font-size:11px;color:var(--muted);font-weight:700;text-align:center}.wc .st{font-size:11px;font-weight:700;margin-bottom:5px}.wc .tm{font-size:11px;color:var(--muted);margin-bottom:4px}.wc .br{font-size:10px;color:#374151;line-height:1.45}
.wagent{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px}.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#dbeafe;color:#1e3a8a;flex-shrink:0}
.rowflex{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.tight input,.tight select{min-width:auto;width:100%}
.leave-grid{display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr auto;gap:8px;align-items:end}
.small{font-size:11px;color:var(--muted)}
@media(max-width:1100px){.weekgrid{grid-template-columns:220px repeat(7,minmax(150px,1fr));overflow:auto}.grid4{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:700px){.layout{display:block}.side{width:100%}.grid4{grid-template-columns:1fr}.leave-grid{grid-template-columns:1fr}.top{align-items:flex-start}}

body.agent-mode .side{display:none}
body.agent-mode .top{align-items:center}
body.agent-mode .top h1{margin-bottom:0}
.linkbox{font-size:11px;color:#374151;background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:8px 10px;word-break:break-all}
.daycards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.daycard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px}
.daycard h4{font-size:13px;margin-bottom:8px}
.kv{font-size:12px;color:#374151;line-height:1.6}

</style>
</head>
<body>
<div class="layout">
  <aside class="side">
    <div class="brand">
      <h2>Jaidah Automotive</h2>
      <p>CX roster planner<br>Friday fixed off · weekly auto-plan · leave-driven edits</p>
    </div>
    <button class="nb on" data-page="dashboard">Dashboard</button>
    <button class="nb" data-page="weekly">Weekly Planner</button>
    <button class="nb" data-page="leave">Leave Control</button>
    <button class="nb" data-page="breaks">Break Control</button>
    <button class="nb" data-page="team">Team Setup</button>
    <button class="nb" data-page="admin">Admin</button>
    <div class="foot">Built for your CX operation<br>Auto-generate first, edit only when needed</div>
  </aside>
  <main class="main">
    <div class="top">
      <div>
        <h1 id="pageTitle">Dashboard</h1>
        <div class="sub">Selected week drives the roster. Friday is always OFF. App generates the week, you edit only where needed.</div>
      </div>
      <div class="controls">
        <div class="field"><label>Month</label><input type="month" id="monthPicker"></div>
        <div class="field"><label>Week</label><select id="weekPicker"></select></div>
        <button class="btn" id="prevWeek">← Week</button>
        <button class="btn" id="nextWeek">Week →</button>
      </div>
    </div>
    <div class="pg" id="app"></div>
  </main>
</div>
<script>
const STORAGE_KEY='jaidah_roster_v26';
const CLOUD_MASTER_KEY='jaidah_cloud_master_key_v26';
const BIN_PARAM=(new URL(location.href)).searchParams.get('bin') || '';
let syncTimer=null;
let cloudStatus={binId: BIN_PARAM || '', masterKey: localStorage.getItem(CLOUD_MASTER_KEY)||'', saving:false, lastSaved:'', lastError:'', connected:false};
const defaultAgents=[
{id:1,name:'Jofferson Nucup',lang:'English',shift:1,active:true,preferredOff:2},
{id:2,name:'Ghizlen',lang:'English/Arabic',shift:1,active:true,preferredOff:0},
{id:3,name:'Karen Roco',lang:'English',shift:1,active:true,preferredOff:0},
{id:4,name:'Mohamed Amine',lang:'English/Arabic',shift:1,active:true,preferredOff:3},
{id:5,name:'Souhire',lang:'English/Arabic',shift:1,active:true,preferredOff:4},
{id:6,name:'Abbey Rose',lang:'English',shift:1,active:true,preferredOff:6},
{id:7,name:'Habiba Selimi',lang:'English/Arabic',shift:1,active:true,preferredOff:3},
{id:8,name:'Mohamed Khadraoui',lang:'English/Arabic',shift:1,active:true,preferredOff:2},
{id:9,name:'Sief Al Dine',lang:'Arabic',shift:1,active:true,preferredOff:1},
{id:10,name:'Hssan Boussetta',lang:'English/Arabic',shift:2,active:true,preferredOff:4},
{id:11,name:'Lee Jerick',lang:'English/Arabic',shift:2,active:true,preferredOff:0},
{id:12,name:'Abderahman',lang:'English/Arabic',shift:2,active:true,preferredOff:2},
{id:13,name:'Ghada',lang:'English/Arabic',shift:2,active:true,preferredOff:3},
{id:14,name:'Chrstine',lang:'English/Arabic',shift:2,active:true,preferredOff:2},
{id:15,name:'Ma Cristina Beltran',lang:'English/Arabic',shift:2,active:true,preferredOff:1}
];
const requiredByDay={6:10,0:11,1:11,2:11,3:10,4:9,5:0}; // Sat-Fri as JS day numbers
const shiftLabel={1:'08:00-17:30',2:'09:30-19:00'};
const breakTemplates={
1:[['09:45-10:00','12:00-12:30','15:00-15:15'],['10:00-10:15','12:30-13:00','15:15-15:30'],['10:15-10:30','13:00-13:30','15:30-15:45'],['10:30-10:45','13:30-14:00','15:45-16:00']],
2:[['10:15-10:30','12:30-13:00','15:30-15:45'],['10:30-10:45','13:00-13:30','15:45-16:00'],['10:45-11:00','13:30-14:00','16:00-16:15'],['11:00-11:15','14:00-14:30','16:15-16:30']]
};
const pages={dashboard:'Dashboard',weekly:'Weekly Planner',leave:'Leave Control',breaks:'Break Control',team:'Team Setup',admin:'Admin'};
let state=loadState();
const urlParams=new URLSearchParams(location.search);
const agentView=urlParams.get('view')==='agent';
const agentViewId=Number(urlParams.get('agent')||0);
let currentPage=agentView?'dashboard':'dashboard';
if(agentView) document.body.classList.add('agent-mode');

function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed=JSON.parse(raw);
      parsed.agents ||= JSON.parse(JSON.stringify(defaultAgents));
      parsed.leaves ||= [];
      parsed.weekOverrides ||= {};
      parsed.month ||= todayMonth();
      parsed.selectedWeek ||= 0;
      parsed.breakOverrides ||= {};
      return parsed;
    }
  }catch(e){}
  return {agents:JSON.parse(JSON.stringify(defaultAgents)),leaves:[],weekOverrides:{},breakOverrides:{},month:todayMonth(),selectedWeek:0};
}
function saveState(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
  if(cloudStatus.binId && cloudStatus.masterKey) scheduleCloudSave();
}
function todayMonth(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function pad(n){return String(n).padStart(2,'0');}
function fmtDate(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function humanDate(d){return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});}
function avatar(name){return name.split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase();}
function getMonthInfo(monthStr){
  const [y,m]=monthStr.split('-').map(Number); const first=new Date(y,m-1,1); const last=new Date(y,m,0); const weeks=[];
  let start=new Date(first); while(start.getDay()!==6) start.setDate(start.getDate()-1); // back to Saturday
  while(start<=last || start.getDay()!==6 || weeks.length===0){
    const s=new Date(start); const e=new Date(start); e.setDate(e.getDate()+6); weeks.push({start:s,end:e,label:`${humanDate(s)} - ${humanDate(e)}`}); start.setDate(start.getDate()+7);
    if(start>last && start.getMonth()!==first.getMonth() && start.getDay()===6) break;
  }
  return {year:y,month:m,weeks};
}
function getSelectedWeek(){const info=getMonthInfo(state.month); if(state.selectedWeek>info.weeks.length-1) state.selectedWeek=info.weeks.length-1; if(state.selectedWeek<0) state.selectedWeek=0; return info.weeks[state.selectedWeek];}
function weekKey(start){return fmtDate(start);} 
function isArabic(agent){return /Arabic/i.test(agent.lang);} 
function getLeaveDates(agentId,start,end){
  const out=[]; let d=new Date(start); const e=new Date(end); while(d<=e){out.push(fmtDate(d)); d.setDate(d.getDate()+1);} return out;
}
function getLeaveMap(){
  const map={};
  state.leaves.forEach(l=>{getLeaveDates(l.agentId,l.start,l.end).forEach(dt=>{map[`${l.agentId}|${dt}`]=l.type||'Leave';});});
  return map;
}
function activeAgents(){return state.agents.filter(a=>a.active);}
function getAgentById(id){return state.agents.find(a=>a.id===id);}
function getAgentLink(agentId){return currentAgentLink();}
function countWeeklyLeaves(agentId,week){
  const leaveMap=getLeaveMap(); let c=0; for(let i=0;i<7;i++){ const d=new Date(week.start); d.setDate(d.getDate()+i); if(leaveMap[`${agentId}|${fmtDate(d)}`]) c++; } return c;
}
function autoSecondOffDate(agent,week){
  if(countWeeklyLeaves(agent.id,week)>=2) return null; // leave already gives rest
  let best=null;
  for(let i=0;i<7;i++){
    const d=new Date(week.start); d.setDate(d.getDate()+i); const dow=d.getDay();
    if(dow===5) continue; // Friday fixed off handled separately
    const score=(dow===agent.preferredOff?0:2)+(dow===4?0.2:0)+(dow===6?0.5:0)+(dow===0?0.8:0)+(dow===1?1:0)+(dow===2?1.2:0)+(dow===3?1.5:0);
    if(!best || score<best.score) best={date:fmtDate(d),score};
  }
  return best?best.date:null;
}
function getWeekPlan(week){
  const leaveMap=getLeaveMap();
  const overrides=state.weekOverrides[weekKey(week.start)]||{};
  const plan={};
  activeAgents().forEach(agent=>{
    const secondOff=autoSecondOffDate(agent,week);
    for(let i=0;i<7;i++){
      const d=new Date(week.start); d.setDate(d.getDate()+i); const ds=fmtDate(d); const k=`${agent.id}|${ds}`;
      let status='WORK'; let reason='';
      if(d.getDay()===5){status='OFF'; reason='Friday fixed';}
      else if(leaveMap[k]){status='LEAVE'; reason=leaveMap[k];}
      else if(secondOff && ds===secondOff){status='OFF'; reason='Weekly off';}
      if(overrides[k]){status=overrides[k].status; reason=overrides[k].reason||'Manual edit';}
      plan[k]={status,reason};
    }
  });
  return plan;
}
function getDaySummary(dateStr,weekPlan){
  let available=0, arabic=0, shift1=0, shift2=0, off=0, leave=0, required=requiredByDay[new Date(dateStr).getDay()]||0;
  activeAgents().forEach(a=>{
    const p=weekPlan[`${a.id}|${dateStr}`];
    if(!p) return;
    if(p.status==='WORK'){
      available++;
      if(a.shift===1) shift1++; else shift2++;
      if(isArabic(a)) arabic++;
    }else if(p.status==='LEAVE'){
      leave++;
    }else if(p.status==='OFF'){
      off++;
    }
  });
  return {available,arabic,required,gap:available-required,shift1,shift2,off,leave};
}
function getBreaksForAgent(agent,workingAgentsOfShiftIndex){
  const arr=breakTemplates[agent.shift]||breakTemplates[1]; return arr[workingAgentsOfShiftIndex%arr.length];
}
function parseRangeMinutes(r){
  const [s,e]=r.split('-');
  const [sh,sm]=s.split(':').map(Number);
  const [eh,em]=e.split(':').map(Number);
  return {start:sh*60+sm,end:eh*60+em};
}
function overlapsRange(a,b){ return a.start < b.end && b.start < a.end; }
function getBreakOverride(agentId,dateStr){ return state.breakOverrides[`${agentId}|${dateStr}`] || null; }
function countBreakConflicts(dateStr, weekPlan, proposal, exceptAgentId){
  const ranges=[proposal[0],proposal[1],proposal[2]].map(parseRangeMinutes);
  let count=0;
  activeAgents().forEach(agent=>{
    if(agent.id===exceptAgentId) return;
    const p=weekPlan[`${agent.id}|${dateStr}`];
    if(!p || p.status!=='WORK') return;
    const current=getBreakOverride(agent.id,dateStr) || null;
    const br=current ? [current[0],current[1],current[2]] : null;
    const fallback = br || null;
    const other=(fallback || []);
    if(!other.length) return;
    const oRanges=other.map(parseRangeMinutes);
    ranges.forEach(r=>{ oRanges.forEach(orng=>{ if(overlapsRange(r,orng)) count++; }); });
  });
  return count;
}
function buildBreakPlanForDate(dateStr,weekPlan){
  const result={};
  const usage={};
  function canUse(range){
    for(let t=range.start;t<range.end;t+=15){ if((usage[t]||0)>=2) return false; }
    return true;
  }
  function reserve(range){
    for(let t=range.start;t<range.end;t+=15){ usage[t]=(usage[t]||0)+1; }
  }
  [1,2].forEach(shift=>{
    let idx=0;
    activeAgents().filter(agent=>agent.shift===shift).forEach(agent=>{
      const p=weekPlan[`${agent.id}|${dateStr}`];
      if(!p || p.status!=='WORK') return;
      const ov=getBreakOverride(agent.id,dateStr);
      if(ov){ result[agent.id]=ov; ov.forEach(x=>reserve(parseRangeMinutes(x))); return; }
      const templates=breakTemplates[shift]||breakTemplates[1];
      let selected=templates[idx % templates.length];
      for(let step=0; step<templates.length; step++) {
        const cand=templates[(idx+step) % templates.length];
        if(cand.every(x=>canUse(parseRangeMinutes(x)))) { selected=cand; idx=(idx+step+1); break; }
      }
      result[agent.id]=selected;
      selected.forEach(x=>reserve(parseRangeMinutes(x)));
      idx++;
    });
  });
  return result;
}

function publicState(){ return JSON.parse(JSON.stringify(state)); }
async function fetchJson(url, opts={}){
  const res=await fetch(url, opts);
  let data=null;
  try{ data=await res.json(); }catch(e){}
  if(!res.ok){
    const msg=(data && (data.message||data.error)) || `HTTP ${res.status}`;
    throw new Error(msg);
  }
  return data;
}
function applyBinToUrl(binId){
  const u=new URL(location.href);
  if(binId) u.searchParams.set('bin',binId); else u.searchParams.delete('bin');
  history.replaceState({},'',u.toString());
}
async function loadCloudState(binId){
  const data=await fetchJson(`https://api.jsonbin.io/v3/b/${binId}/latest`, {headers:{'X-Bin-Meta':'false'}});
  if(!data || !data.agents) throw new Error('Cloud record is empty or invalid.');
  state=data;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  cloudStatus.connected=true;
  cloudStatus.binId=binId;
  applyBinToUrl(binId);
}
async function createCloudBin(masterKey){
  const data=await fetchJson('https://api.jsonbin.io/v3/b',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'X-Master-Key': masterKey,
      'X-Bin-Private':'false',
      'X-Bin-Name':'Jaidah CX Roster'
    },
    body: JSON.stringify(publicState())
  });
  return data.metadata && data.metadata.id;
}
async function saveCloudNow(){
  if(!cloudStatus.binId || !cloudStatus.masterKey) return;
  cloudStatus.saving=true;
  cloudStatus.lastError='';
  try{
    await fetchJson(`https://api.jsonbin.io/v3/b/${cloudStatus.binId}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':cloudStatus.masterKey},
      body: JSON.stringify(publicState())
    });
    cloudStatus.lastSaved=new Date().toLocaleTimeString();
    cloudStatus.connected=true;
  }catch(err){
    cloudStatus.lastError=err.message || 'Cloud save failed.';
  }finally{
    cloudStatus.saving=false;
    updateCloudBanner();
  }
}
function scheduleCloudSave(){
  clearTimeout(syncTimer);
  syncTimer=setTimeout(saveCloudNow, 600);
}
function currentAgentLink(){
  const u=new URL(location.href);
  const out=new URL('index.html', u.href);
  if(cloudStatus.binId) out.searchParams.set('bin', cloudStatus.binId);
  return out.toString();
}
function currentAdminLink(){
  const u=new URL(location.href);
  if(cloudStatus.binId) u.searchParams.set('bin', cloudStatus.binId);
  return u.toString();
}
function escapeHtml(str=''){ return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function updateCloudBanner(){
  const el=document.getElementById('cloudStatusBox');
  if(!el) return;
  let html='';
  if(cloudStatus.binId){
    html += `<div class="ok">Cloud bin connected: <strong>${cloudStatus.binId}</strong>${cloudStatus.lastSaved?` · Last saved ${cloudStatus.lastSaved}`:''}${cloudStatus.saving?' · Saving...':''}</div>`;
    html += `<div class="small" style="margin-bottom:8px">Admin link: ${escapeHtml(currentAdminLink())}</div>`;
    html += `<div class="small">Agent link: ${escapeHtml(currentAgentLink())}</div>`;
  }else{
    html += `<div class="warn">Cloud is not connected yet. Paste your JSONBin Master Key below and click Connect cloud.</div>`;
  }
  if(cloudStatus.lastError) html += `<div class="bad" style="margin-top:8px">${escapeHtml(cloudStatus.lastError)}</div>`;
  el.innerHTML=html;
}

function pageNav(){
  if(agentView){
    document.querySelectorAll('.nb').forEach(b=>b.style.display='none');
    const a=getAgentById(agentViewId);
    document.getElementById('pageTitle').textContent=a?`${a.name} · My Schedule`:'Agent View';
    return;
  }
  document.querySelectorAll('.nb').forEach(b=>{b.classList.toggle('on',b.dataset.page===currentPage);});
  document.getElementById('pageTitle').textContent=pages[currentPage];
}
